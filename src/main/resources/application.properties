spring.application.name=messagebroker
eureka.client.service-url.defaultZone=${THIRDEYE_RESUME_UPDATER_SERVER_URL}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.profiles.active=${PROFILE}
thirdeye.resume.updater.api.key=${THIRDEYE_RESUME_UPDATER_API_KEY}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
thirdeye.timezone = Asia/Kolkata
thirdeye.maximumqueuesize=1000
thirdeye.maximumqueues=10
thirdeye.istesting = ${IS_TESTING}
thirdeye.istesting.code = ${TESTING_CODE}

